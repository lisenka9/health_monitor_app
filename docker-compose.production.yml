version: '3.8'

services:
  backend:
    image: ghcr.io/lisenka9/health-monitor-backend:${TAG:-latest}
    environment:
      - ENVIRONMENT=production
      - IMAGE_VERSION=${TAG:-latest}
      - COMMIT_HASH=${COMMIT_HASH:-unknown}
    env_file:
      - .env.production
    networks:
      - health-monitor-network
    restart: unless-stopped
    deploy:
      replicas: 3  

  frontend:
    image: ghcr.io/lisenka9/health-monitor-frontend:${TAG:-latest}
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=https://api.myapp.com
      - ENVIRONMENT=production
    env_file:
      - .env.production
    networks:
      - health-monitor-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - health-monitor-network
    restart: unless-stopped

networks:
  health-monitor-network:
    driver: bridge

volumes:
  postgres_data: